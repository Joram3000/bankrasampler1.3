; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ─── Shared base config ───────────────────────────────────────────────────────
[base]
platform              = espressif32
board                 = esp32dev
framework             = arduino
monitor_speed         = 115200
board_build.partitions = huge_app.csv
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    olikraus/U8g2@^2.30.3

; ─── Normal (no Bluetooth) ────────────────────────────────────────────────────
; Full delay buffer (300 ms @ 44100 Hz = ~26 KB), no BT overhead.
[env:esp32dev]
extends     = base

; ─── Bluetooth mode ───────────────────────────────────────────────────────────
; Delay buffer capped at 150 ms (~13 KB) to leave room for A2DP stacks.
; Build flag -DBLUETOOTH_MODE gates all BT code in main.cpp and audio_mixer.h.
; Note: CONFIG_BT_* flags komen uit de ingebakken Arduino ESP32 sdkconfig —
; die NIET hier herhalen want dat geeft redefinition conflicts.
[env:esp32dev-bt]
extends     = base
build_flags =
    -DBLUETOOTH_MODE
lib_deps    =
    adafruit/Adafruit SSD1306@^2.5.7
    olikraus/U8g2@^2.30.3
    https://github.com/pschatzmann/ESP32-A2DP
